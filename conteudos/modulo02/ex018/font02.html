<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face{
            font-family: 'Floraison des Amours';
            src: url('fontes/Floraison des Amours.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;

            /*
            Tipo de fonte: 
            - truetype: .ttf
            - opentype: .otf
            - embedded-opentype: .eot
            */
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        h1{
            font-family: 'Floraison des Amours', Times, serif;
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Consequatur tempore aliquam nihil reiciendis, minus in iste ut. A aut iste mollitia sequi maiores nostrum, vero possimus? Perferendis blanditiis reiciendis commodi!</p>
</body>
</html>
