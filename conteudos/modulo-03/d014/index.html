<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body{
            font-family: 'Times New Roman', Times, serif;
        }

        table{
            border-collapse: collapse;
        }

        caption{
            font-size: 1.3em;
            font-weight: bold;
            padding: 10px;
        }

        th, td{
            border: 1px solid black;
            padding: 10px;
        }

        thead > tr{
            background-color: rgb(96, 96, 96);
            color: white;
        }

        tr.media{
            background-color: rgb(96, 96, 96);
            color: white;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>Tabela de Notas</h1>
    <table>
        <thead>
            <tr>
                <th rowspan="2" scope="col">Área</th>
                <th rowspan="2" scope="col">Disciplinas</th>
                <th colspan="2" scope="colgroup">Notas</th>
                <th rowspan="2" scope="col">Média</th>
            </tr>
            <tr>
                <th scope="col">Nota 1</th>
                <th scope="col">Nota 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="4" scope="rowgroup">Exatas</th>
                <td>Matemática</td>
                <td>10.0</td>
                <td>7.8</td>
                <td>8.9</td>
            </tr>
            <tr>
                <td>Física</td>
                <td>5.5</td>
                <td>6.7</td>
                <td>6.125</td>
            </tr>
            <tr>
                <td>Quimica</td>
                <td>3.5</td>
                <td>7.0</td>
                <td>5.25</td>
            </tr>
            <tr>
                <td>Biologia</td>
                <td>8.0</td>
                <td>9.5</td>
                <td>8.75</td>
            </tr>
            <tr class="media">
                <th colspan="4" scope="row" > Média de Exatas</th>
                <td>7,25</td>
            </tr>
            <tr>
                <th rowspan="2" scope="rowgroup">Humanas</th>
                <td>História</td>
                <td>8.9</td>
                <td>9.0</td>
                <td>8.95</td>
            </tr>
            <tr>
                <td>Geografia</td>
                <td>7,0</td>
                <td>7.0</td>
                <td>7.0</td>
            </tr>
            <tr class="media">
                <th colspan="4" scope="row" > Média de Humanas</th>
                <td>8.0</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
