<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table{
            width: 500px;
            border-collapse: collapse;
        }

        caption{
            font-size: 1.3em;
            font-weight: bolder;
            padding: 8px;
        }

        th, td{
            border: 1px solid black;
            padding: 8px;
        }

        col.cnome{
            background-color: chartreuse;
        }

        col.csexo{
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h1>Exercicio de tabelas</h1>

    <table>
        <colgroup>
            <col class="cnome">
            <col class="csexo">
            <col class="cidade">
            <col class="cprofissao">
        </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th scoupe="col">Nome</th>
            <th scoupe="col">Sexo</th>
            <th scoupe="col">Idade</th>
            <th scoupe="col">Profissão</th>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>Feminino</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>Gustavo</td>
            <td>Masculino</td>
            <td>45</td>
            <td>Contador</td>
        </tr>
        <tr>
            <td>Felipe</td>
            <td>Masculino</td>
            <td>18</td>
            <td>Programador</td>
        </tr>
        <tr>
            <td>Cláudio</td>
            <td>Masculino</td>
            <td>24</td>
            <td>Médico</td>
        </tr>
        <tr>
            <td>Maria</td>
            <td>Feminino</td>
            <td>19</td>
            <td>Nutricionista</td>
        </tr>
    </table>
</body>
</html>
